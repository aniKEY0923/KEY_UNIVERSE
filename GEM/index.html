<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KEY:VERSE Prototype</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { width: 350px; text-align: center; border: 4px solid #444; padding: 20px; background: #222; position: relative; }
        #status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: #0f0; }
        #character-box { width: 150px; height: 150px; margin: 0 auto 20px; border: 2px dashed #666; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .stat-bar { background: #444; height: 10px; width: 100%; margin: 5px 0 15px; border-radius: 5px; overflow: hidden; }
        .stat-fill { height: 100%; width: 0%; transition: width 0.3s; }
        #power-fill { background: #ffd700; } /* Gasoline Gold */
        #vibe-fill { background: #ff4500; }  /* Bad Love Orange */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; cursor: pointer; background: #333; color: white; border: 1px solid #666; }
        button:hover { background: #555; }
        #dialogue { margin-top: 20px; font-size: 14px; min-height: 40px; border-top: 1px solid #444; padding-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="status-bar">
        <span>Day: <span id="day">1</span></span>
        <span>Energy: <span id="energy">100</span>%</span>
    </div>

    <div id="character-box" id="char-img">❓</div>
    <div id="char-name">미지의 키 (Unknown)</div>

    <div style="text-align: left; font-size: 12px; margin-top: 15px;">Power (Gasoline)</div>
    <div class="stat-bar"><div id="power-fill" class="stat-fill"></div></div>
    
    <div style="text-align: left; font-size: 12px;">Vibe (Bad Love)</div>
    <div class="stat-bar"><div id="vibe-fill" class="stat-fill"></div></div>

    <div class="btn-group">
        <button onclick="act('practice')">🎤 연습하기</button>
        <button onclick="act('vibe')">📺 전시관람</button>
        <button onclick="act('rest')" style="grid-column: span 2;">🛌 휴식 (다음날)</button>
    </div>

    <div id="dialogue">"어? 왔어? 나 좀 잘 키워줘?"</div>
</div>

<script>
    let stats = { power: 0, vibe: 0, energy: 100, day: 1, isAwakened: false };

    function updateUI() {
        document.getElementById('day').innerText = stats.day;
        document.getElementById('energy').innerText = stats.energy;
        document.getElementById('power-fill').style.width = stats.power + '%';
        document.getElementById('vibe-fill').style.width = stats.vibe + '%';
    }

    function act(type) {
        if (stats.isAwakened) return;
        if (stats.energy < 20 && type !== 'rest') {
            document.getElementById('dialogue').innerText = "나 좀 지쳤어... 쉬게 해줘.";
            return;
        }

        if (type === 'practice') {
            stats.power += 20; stats.energy -= 20;
            document.getElementById('dialogue').innerText = "땀 흘리니까 개운하네!";
        } else if (type === 'vibe') {
            stats.vibe += 20; stats.energy -= 20;
            document.getElementById('dialogue').innerText = "영감을 좀 받았어.";
        } else if (type === 'rest') {
            stats.energy = 100; stats.day += 1;
            document.getElementById('dialogue').innerText = "꿀잠 잤다! 오늘 뭐할까?";
        }

        updateUI();
        checkAwakening();
    }

    function checkAwakening() {
        if (stats.power >= 100 || stats.vibe >= 100) {
            stats.isAwakened = true;
            if (stats.power >= stats.vibe) {
                document.getElementById('character-box').innerText = "👑";
                document.getElementById('character-box').style.background = "#ffd700";
                document.getElementById('char-name').innerText = "Gasoline KEY";
                document.getElementById('dialogue').innerText = "가솔린 파라오로 각성했어! 어때, 멋있지?";
            } else {
                document.getElementById('character-box').innerText = "🚀";
                document.getElementById('character-box').style.background = "#ff4500";
                document.getElementById('char-name').innerText = "Bad Love KEY";
                document.getElementById('dialogue').innerText = "배드러브 우주 전사로 각성했어! 키치하지?";
            }
        }
    }
</script>
</body>
</html>
