<!-- 🔥 핵심 변경된 부분만 포함된 안전 통합본 -->

<script>

// ✅ state 수정
const state = {
  day: 1,
  energy: 100,
  maxEnergy: 100,
  stats: {
    dark: 0,
    mystery: 0,
    social: 0,
    cute: 0,
    scary: 0,
    humor: 0
  },
  awakened: null,
  isActing: false
};


// ✅ statEls 수정
const statEls = {
  dark: { fill: document.getElementById('fill-dark'), val: document.getElementById('val-dark') },
  mystery: { fill: document.getElementById('fill-mystery'), val: document.getElementById('val-mystery') },
  social: { fill: document.getElementById('fill-social'), val: document.getElementById('val-social') },
  cute: { fill: document.getElementById('fill-cute'), val: document.getElementById('val-cute') },
  scary: { fill: document.getElementById('fill-scary'), val: document.getElementById('val-scary') },
  humor: { fill: document.getElementById('fill-humor'), val: document.getElementById('val-humor') }
};


// ✅ 스케줄 버튼 이벤트 유지 (기존 코드 그대로 사용)
document.querySelectorAll('.schedule-btn').forEach(btn => {
  btn.addEventListener('click', () => startAction(btn.dataset.act));
});


// ✅ 액션 로직 완전 교체
function finishAction(type){

  switch(type){

    case 'dance':
      state.stats.social += 2;
      state.energy -= 20;
      break;

    case 'vocal':
      state.stats.dark += 2;
      state.energy -= 20;
      break;

    case 'cook':
      state.stats.cute += 2;
      state.energy -= 20;
      break;

    case 'bath':
      state.stats.cute += 1;
      state.stats.mystery += 1;
      state.energy -= 15;
      break;

    case 'walk':
      state.stats.mystery += 2;
      state.stats.scary += 1;
      state.energy -= 20;
      break;

    case 'clean':
      state.stats.social += 1;
      state.energy -= 15;
      break;

    case 'study':
      state.stats.dark += 1;
      state.stats.scary += 1;
      state.energy -= 20;
      break;

    case 'shop':
      state.stats.social += 2;
      state.stats.cute += 1;
      state.energy -= 20;
      break;

    case 'letters':
      state.stats.humor += 2;
      state.energy -= 20;
      break;

    case 'exhibit':
      state.stats.mystery += 2;
      state.energy -= 20;
      break;

    case 'netflix':
      state.stats.humor += 1;
      state.stats.dark += 1;
      state.energy -= 20;
      break;

    case 'rest':
      state.day += 1;
      state.energy = state.maxEnergy;
      break;
  }

  state.energy = clamp(state.energy, 0, state.maxEnergy);
}


// ✅ 각성 조건 변경
function canAwaken(){
  const total = Object.values(state.stats).reduce((a,b)=>a+b,0);
  return total >= 20;
}


// ✅ KEY 분기 시스템 추가
function detectIdentity(){

  const s = state.stats;

  const builds = [
    { name:'Villain KEY', score:s.dark*1.2 + s.scary },
    { name:'Dream KEY', score:s.mystery*1.2 + s.dark },
    { name:'Idol KEY', score:s.cute*1.2 + s.social },
    { name:'Trickster KEY', score:s.humor*1.2 + s.mystery },
    { name:'Royal KEY', score:s.social*1.2 + s.dark },
    { name:'Healing KEY', score:s.cute*1.2 + s.humor }
  ];

  return builds.sort((a,b)=>b.score-a.score)[0];
}


// ✅ UI 업데이트 (기존 코드 유지하면서 자동 대응)
function updateScheduleUI(){

  Object.keys(state.stats).forEach(key => {
    if(statEls[key]){
      statEls[key].val.textContent = state.stats[key];
      statEls[key].fill.style.width =
        `${Math.min(100, state.stats[key] / 10 * 100)}%`;
    }
  });

}


// ✅ 각성 버튼 클릭 (기존 흐름 유지)
document.getElementById('awakenBtn').addEventListener('click', () => {

  if(!canAwaken()) return;

  const result = detectIdentity();

  alert("각성: " + result.name);

  state.awakened = result;
});


</script>
