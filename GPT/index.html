<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEY:VERSE</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

/* ===== 화면 ===== */
.screen{
  display:none;
}
.screen.active{
  display:block;
}

/* ===== 방 ===== */
.room{
  position:relative;
  width:100%;
  height:100vh;
  background:url("img/room_default.png") center/cover no-repeat;
  overflow:hidden;
}

/* ===== 캐릭터 (🔥 1/3 크기) ===== */
.player{
  position:absolute;
  width:48px;   /* 기존 144 기준 → 1/3 */
  height:72px;
  left:50%;
  top:60%;
  transform:translate(-50%, -50%);
}

.player img{
  width:100%;
  height:100%;
  object-fit:contain;
  image-rendering:pixelated;
}

/* ===== 간단 UI ===== */
.ui{
  position:absolute;
  top:10px;
  left:10px;
}
button{
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<!-- ===== 스케줄 화면 ===== -->
<div class="screen active" id="schedule">
  <h2>스케줄</h2>
  <button onclick="addStat('stage')">연습</button>
  <button onclick="addStat('mood')">감상</button>
  <button onclick="rest()">휴식</button>
  <button onclick="awaken()">각성</button>
</div>

<!-- ===== 각성 ===== -->
<div class="screen" id="awaken">
  <h2 id="resultText"></h2>
  <button onclick="enterRoom()">방으로 이동</button>
</div>

<!-- ===== 방 ===== -->
<div class="screen" id="room">
  <div class="room" id="roomMap">

    <!-- 캐릭터 -->
    <div class="player" id="player">
      <img id="playerImg" src="img/KEY_default.png">
    </div>

    <div class="ui">
      <button onclick="reset()">리셋</button>
    </div>

  </div>
</div>

<script>

/* ===== 상태 ===== */
let state = {
  stage:0,
  mood:0,
  awakened:null,
  x:window.innerWidth/2,
  y:window.innerHeight*0.6
};

/* ===== 스케줄 ===== */
function addStat(type){
  state[type]+=1;
}

function rest(){
  alert("휴식 완료");
}

/* ===== 각성 ===== */
function awaken(){
  if(state.stage >= state.mood){
    state.awakened = "gasoline";
    document.getElementById("playerImg").src = "img/KEY_gasoline.png";
    document.getElementById("resultText").innerText = "Gasoline KEY";
  }else{
    state.awakened = "badlove";
    document.getElementById("playerImg").src = "img/KEY_badlove.png";
    document.getElementById("resultText").innerText = "Bad Love KEY";
  }

  show("awaken");
}

/* ===== 화면 전환 ===== */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function enterRoom(){
  show("room");
}

/* ===== 이동 ===== */
const speed = 6;

document.addEventListener("keydown", (e)=>{
  const player = document.getElementById("player");

  if(!document.getElementById("room").classList.contains("active")) return;

  if(e.key === "ArrowUp") state.y -= speed;
  if(e.key === "ArrowDown") state.y += speed;
  if(e.key === "ArrowLeft") state.x -= speed;
  if(e.key === "ArrowRight") state.x += speed;

  // 경계 제한
  state.x = Math.max(0, Math.min(window.innerWidth - 48, state.x));
  state.y = Math.max(0, Math.min(window.innerHeight - 72, state.y));

  player.style.left = state.x + "px";
  player.style.top = state.y + "px";
});

/* ===== 리셋 ===== */
function reset(){
  location.reload();
}

</script>

</body>
</html>
