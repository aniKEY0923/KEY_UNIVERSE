<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>KEY Prototype</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
  touch-action: manipulation;
}

.container{
  max-width:420px;
  margin:auto;
  padding:12px;
}

.stage{
  position:relative;
  width:100%;
  aspect-ratio:3/2;
  background:url("img/room_default.png") center/cover;
  border-radius:16px;
}

.day{
  position:absolute;
  top:8px;
  left:8px;
  background:rgba(0,0,0,.5);
  padding:6px 10px;
  border-radius:999px;
}

.player{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:60px;
}

.awaken{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-40px;
  display:none;
  background:linear-gradient(45deg,pink,purple);
  padding:8px 14px;
  border-radius:999px;
}

.stat{
  margin:6px 0;
}

.bar{
  height:8px;
  background:#333;
  border-radius:999px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,pink,purple);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:10px;
}

button{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#222;
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

<div class="stage" id="stage">
  <div class="day" id="day">DAY 1</div>
  <img src="img/KEY_default.png" class="player">
  <button class="awaken" id="awakenBtn">각성하기</button>
</div>

<div id="stats"></div>

<div class="grid" id="actions"></div>

</div>

<script>

const state={
  day:1,
  energy:100,
  maxEnergy:100,
  actionsToday:0,
  maxActionsPerDay:5,
  stats:{
    dark:0,
    mystery:0,
    social:0,
    cute:0,
    scary:0,
    humor:0
  }
};

const actions=[
  {key:"dance",name:"댄스연습"},
  {key:"vocal",name:"보컬연습"},
  {key:"cook",name:"요리"},
  {key:"bath",name:"목욕"},
  {key:"walk",name:"산책"},
  {key:"clean",name:"청소"},
  {key:"study",name:"콘셉트연구"},
  {key:"shop",name:"쇼핑"},
  {key:"letters",name:"팬레터"},
  {key:"exhibit",name:"전시회"},
  {key:"netflix",name:"넷플릭스"},
  {key:"rest",name:"휴식"}
];

function render(){

  document.getElementById("day").innerText="DAY "+state.day;

  const statsEl=document.getElementById("stats");
  statsEl.innerHTML="";

  for(let k in state.stats){
    statsEl.innerHTML+=`
    <div class="stat">
      ${k}: ${state.stats[k]}
      <div class="bar">
        <div class="fill" style="width:${state.stats[k]*10}%"></div>
      </div>
    </div>`;
  }

  const actEl=document.getElementById("actions");
  actEl.innerHTML="";

  actions.forEach(a=>{
    const b=document.createElement("button");
    b.innerText=a.name;
    b.onclick=()=>doAction(a.key);
    actEl.appendChild(b);
  });

  document.getElementById("awakenBtn").style.display=
    state.day>=30?"block":"none";
}

function doAction(type){

  if(state.actionsToday>=state.maxActionsPerDay){
    nextDay();
    return;
  }

  if(type==="walk"){
    document.getElementById("stage").style.background=
      "url('img/walk.jpg') center/cover";
  }else{
    document.getElementById("stage").style.background=
      "url('img/room_default.png') center/cover";
  }

  switch(type){

    case"dance":
      state.stats.social+=2;
      state.stats.dark-=1;
      break;

    case"vocal":
      state.stats.dark+=2;
      state.stats.cute-=1;
      break;

    case"cook":
      state.stats.cute+=2;
      state.stats.scary-=1;
      break;

    case"bath":
      state.stats.cute+=1;
      state.stats.mystery+=1;
      break;

    case"walk":
      state.stats.mystery+=2;
      state.stats.scary+=1;
      state.stats.social-=1;
      break;

    case"clean":
      state.stats.social+=1;
      state.stats.humor-=1;
      break;

    case"study":
      state.stats.dark+=1;
      state.stats.scary+=1;
      state.stats.cute-=1;
      break;

    case"shop":
      state.stats.social+=2;
      state.stats.cute+=1;
      state.stats.mystery-=1;
      break;

    case"letters":
      state.stats.humor+=2;
      state.stats.dark-=1;
      break;

    case"exhibit":
      state.stats.mystery+=2;
      state.stats.social-=1;
      break;

    case"netflix":
      state.stats.humor+=1;
      state.stats.dark+=1;
      state.stats.social-=1;
      break;

    case"rest":
      nextDay();
      return;
  }

  // 음수 방지
  Object.keys(state.stats).forEach(k=>{
    state.stats[k]=Math.max(0,state.stats[k]);
  });

  state.actionsToday++;

  render();
}

function nextDay(){
  state.day++;
  state.energy=state.maxEnergy;
  state.actionsToday=0;
  alert("하루가 지나갔다!");
  render();
}

function detectIdentity(){

  const s=state.stats;

  const builds=[
    {name:"Villain KEY",score:s.dark*1.2+s.scary},
    {name:"Dream KEY",score:s.mystery*1.2+s.dark},
    {name:"Idol KEY",score:s.cute*1.2+s.social},
    {name:"Trickster KEY",score:s.humor*1.2+s.mystery},
    {name:"Royal KEY",score:s.social*1.2+s.dark},
    {name:"Healing KEY",score:s.cute*1.2+s.humor}
  ];

  return builds.sort((a,b)=>b.score-a.score)[0];
}

document.getElementById("awakenBtn").onclick=()=>{
  const result=detectIdentity();
  alert("각성: "+result.name);
};

render();

</script>

</body>
</html>
